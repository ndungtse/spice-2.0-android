image: mingc/android-build-box:latest

definitions:
  caches:
    gradle: ~/.gradle/caches
    gradle-wrapper: ~/.gradle/wrapper

pipelines:
  custom:
    android-build:
      - variables:
          - name: FLAVOR
            default: dev
            allowed-values:
              - dev
              - qa
              - staging
              - production
          - name: BUILD_TYPE
            default: debug
            allowed-values:
              - debug
              - release
          - name: IS_BUNDLE
            default: false
            allowed-values:
              - true
              - false

      - step:
          name: Build Android App
          oidc: true
          size: 4x
          caches:
            - gradle
            - gradle-wrapper

          script:
            - apt-get update
            - apt-get install -y unzip curl

            # Install AWS CLI v2
            - |
              if ! command -v aws &> /dev/null; then
                echo "Installing AWS CLI v2..."
                curl -s "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
                unzip -q awscliv2.zip
                ./aws/install --bin-dir /usr/local/bin --install-dir /usr/local/aws-cli --update
              else
                echo "AWS CLI already installed"
              fi

            # Ensure PATH
            - export PATH=$PATH:/usr/local/bin

            # Verify installation
            - aws --version

            # OIDC Authentication
            - echo "$BITBUCKET_STEP_OIDC_TOKEN" > /tmp/web-identity-token
            - export AWS_ROLE_ARN=arn:aws:iam::006250192066:role/bitbucket-spice-mobile-s3-role
            - export AWS_WEB_IDENTITY_TOKEN_FILE=/tmp/web-identity-token
            - export AWS_DEFAULT_REGION=ap-south-1

            # Verify AWS role
            - aws sts get-caller-identity

            # Build APK
            - |
              cd Spice-SL
              echo "Generating environment.properties from Bitbucket variables..."
              env | grep -E "^(UHIS_|PROD_|STAGE_|NON_PROD_)" > environment.properties
              echo "Environment properties generated."
              FLAVOR_CAP="$(tr '[:lower:]' '[:upper:]' <<< ${FLAVOR:0:1})${FLAVOR:1}"
              BUILD_TYPE_CAP="$(tr '[:lower:]' '[:upper:]' <<< ${BUILD_TYPE:0:1})${BUILD_TYPE:1}"
              if [ "$IS_BUNDLE" = "true" ]; then
                TASK_NAME="clean bundle${FLAVOR_CAP}${BUILD_TYPE_CAP}"
              else
                TASK_NAME="assemble${FLAVOR_CAP}${BUILD_TYPE_CAP}"
              fi
              echo "Running Gradle task: $TASK_NAME"
              export GRADLE_OPTS="-Dorg.gradle.jvmargs=-Xmx3g -Dkotlin.daemon.jvm.options=-Xmx1g -Dfile.encoding=UTF-8"
              export _JAVA_OPTIONS="-Xmx3g"
              ./gradlew --no-daemon --stacktrace --info --max-workers=2 $TASK_NAME
              mkdir -p ../artifacts
              if [ "$IS_BUNDLE" = "true" ]; then
                find app/build/outputs/bundle -type f -name "*.aab" -print -exec cp {} ../artifacts/ \;
              else
                find app/build/outputs/apk -type f -name "*.apk" -print -exec cp {} ../artifacts/ \;
              fi

            # Upload to S3 by flavor and build type
            - echo "Uploading build ${BITBUCKET_BUILD_NUMBER} - ${FLAVOR}/${BUILD_TYPE}"
            - aws s3 cp ../artifacts s3://spice-mobile-apk-bitbucket/${FLAVOR}/${BUILD_TYPE}/build-${BITBUCKET_BUILD_NUMBER}/ --recursive

            # Overwrite latest so there's always a stable URL for the most recent build
            - |
              if [ "$IS_BUNDLE" = "true" ]; then
                echo "Skipping latest artifact update for bundle generation"
              else
                aws s3 cp ../artifacts s3://spice-mobile-apk-bitbucket/${FLAVOR}/${BUILD_TYPE}/latest/ --recursive
              fi

          artifacts:
            - artifacts/*.apk
            - artifacts/*.aab
